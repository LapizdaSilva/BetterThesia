<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <link rel="stylesheet" href="styles.css" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetterThesia</title>

    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
    <script src="https://cdn.jsdelivr.net/npm/soundfont-player/dist/soundfont-player.min.js"></script>
  </head>


  <body style="margin: 0; background-color: #4f5b5b">
    <div id="topbar">
      <button id="get" class="botaoArquivo">🡻</button>

      <input type="file" id="midiInput" accept=".mid,.midi" style="display: none;" />

      <div class="botaoCentro">
        <button id="rewind">⏮</button>
        <button id="playpause">▶</button>
        <button id="forward">⏭</button>
      </div>

      <div style="flex-grow: 1; margin: 0 15px; display: flex; align-items: center;">
        <input type="range" id="progressBar" min="0" value="0" step="1" style="width: 100%; cursor: pointer;" />
      </div>
      
      <button id="config" class="config">⚙️</button>

      <div style="display: flex; align-items: center; gap: 5px; color: #e0f2f2; margin-left: 15px;">
        <span style="font-size: 14px;">Velocidade:</span>
        <input type="range" id="speedSlider" min="0.2" max="2.0" step="0.1" value="1.0" style="width: 80px;" />
        <span id="speedValue" style="font-size: 14px; width: 35px;">1.0x</span>
      </div>
    </div>

    <div id="main">
      <canvas id="roll"></canvas>
      <canvas id="keyboard"></canvas>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
